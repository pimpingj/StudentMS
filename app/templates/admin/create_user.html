{% extends 'base.html' %}
{% block title %}Create User{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">Create New User</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" id="roleSelect" class="form-select" required>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div id="studentFields" class="border rounded p-3 mb-3 bg-light">
                        <h6 class="mb-3 text-muted">Student Profile</h6>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" name="date_of_birth" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Class</label>
                            <select name="class_id" class="form-select">
                                <option value="">-- No Class --</option>
                                {% for c in classes %}
                                <option value="{{ c.class_id }}">{{ c.class_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div id="teacherFields" class="border rounded p-3 mb-3 bg-light">
                        <h6 class="mb-3 text-muted">Teacher Profile</h6>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="teacher_name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" class="form-control">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.user_list') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    const roleSelect = document.getElementById('roleSelect');
    const studentFields = document.getElementById('studentFields');
    const teacherFields = document.getElementById('teacherFields');
    function toggleProfileFields() {
        const role = roleSelect.value;
        studentFields.style.display = role === 'student' ? 'block' : 'none';
        teacherFields.style.display = role === 'teacher' ? 'block' : 'none';
    }
    roleSelect.addEventListener('change', toggleProfileFields);
    toggleProfileFields();
</script>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Edit Class{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">Edit Class</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Class Name</label>
                        <input type="text" name="class_name" class="form-control"
                               value="{{ cls.class_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Academic Year</label>
                        <input type="text" name="academic_year" class="form-control"
                               value="{{ cls.academic_year or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teacher</label>
                        <select name="teacher_id" class="form-select">
                            <option value="">-- None --</option>
                            {% for t in teachers %}
                            <option value="{{ t.teacher_id }}"
                                {{ 'selected' if cls.teacher_id == t.teacher_id }}>
                                {{ t.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.class_list') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

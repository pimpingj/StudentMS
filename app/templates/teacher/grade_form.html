{% extends 'base.html' %}
{% block title %}{{ 'Edit' if grade else 'Add' }} Grade{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">{{ 'Edit' if grade else 'Add' }} Grade</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Course</label>
                        <select name="course_id" class="form-select" required>
                            {% for c in courses %}
                            <option value="{{ c.course_id }}"
                                {{ 'selected' if grade and grade.course_id == c.course_id }}>
                                {{ c.course_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Student</label>
                        <select name="student_id" class="form-select" required>
                            {% for s in students %}
                            <option value="{{ s.student_id }}"
                                {{ 'selected' if grade and grade.student_id == s.student_id }}>
                                {{ s.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Exam Type</label>
                        <select name="exam_type" class="form-select" required>
                            {% for t in ['midterm', 'final', 'quiz', 'assignment'] %}
                            <option value="{{ t }}"
                                {{ 'selected' if grade and grade.exam_type == t }}>
                                {{ t | capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Score</label>
                        <input type="number" name="score" step="0.1" min="0" max="100"
                               class="form-control" required
                               value="{{ grade.score if grade else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Exam Date</label>
                        <input type="date" name="exam_date" class="form-control"
                               value="{{ grade.exam_date if grade else '' }}">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('teacher.grade_list') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">{{ 'Update' if grade else 'Add' }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Create Exam{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">Create Exam</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Exam Name</label>
                        <input type="text" name="name" class="form-control"
                               placeholder="e.g. Midterm 2025" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Exam Date</label>
                        <input type="date" name="exam_date" class="form-control"
                               value="{{ today }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Participating Classes</label>
                        {% if classes %}
                            {% for c in classes %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="class_ids" value="{{ c.class_id }}"
                                       id="cls_{{ c.class_id }}" checked>
                                <label class="form-check-label" for="cls_{{ c.class_id }}">
                                    {{ c.class_name }}
                                    {% if c.academic_year %}({{ c.academic_year }}){% endif %}
                                </label>
                            </div>
                            {% endfor %}
                        {% else %}
                        <p class="text-muted small">No classes assigned to you yet.</p>
                        {% endif %}
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('teacher.exam_list') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create Exam</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

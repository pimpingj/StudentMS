services:
  - type: web
    name: hssms
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
      - key: DATABASE_URL
        sync: false           # Set this manually in the Render dashboard

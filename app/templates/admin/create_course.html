{% extends 'base.html' %}
{% block title %}Create Course{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">Create New Course</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Course Name</label>
                        <input type="text" name="course_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teacher (optional)</label>
                        <select name="teacher_id" class="form-select">
                            <option value="">-- None --</option>
                            {% for t in teachers %}
                            <option value="{{ t.teacher_id }}">{{ t.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Class (optional)</label>
                        <select name="class_id" class="form-select">
                            <option value="">-- None --</option>
                            {% for c in classes %}
                            <option value="{{ c.class_id }}">{{ c.class_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.course_list') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
